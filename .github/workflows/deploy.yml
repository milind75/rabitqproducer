name: Build and Deploy to EC2

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Run tests
        run: ./gradlew test
      
      - name: Build application
        run: ./gradlew build -x test
      
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: rabitqproducer-jar
          path: build/libs/rabitqproducer-*.jar
          retention-days: 5

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: prod
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: rabitqproducer-jar
          path: ./artifacts
      
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ec2-13-222-56-46.compute-1.amazonaws.com >> ~/.ssh/known_hosts
      
      - name: Create app directory on EC2
        run: |
          ssh -i ~/.ssh/id_ed25519 ubuntu@ec2-13-222-56-46.compute-1.amazonaws.com \
            "mkdir -p ~/rabitqproducer/app"
      
      - name: Deploy JAR to EC2
        run: |
          JAR_FILE=$(ls ./artifacts/rabitqproducer-*.jar | head -1)
          scp -i ~/.ssh/id_ed25519 "$JAR_FILE" \
            ubuntu@ec2-13-222-56-46.compute-1.amazonaws.com:~/rabitqproducer/app/
      
      - name: Stop and restart application on EC2
        run: |
          ssh -i ~/.ssh/id_ed25519 ubuntu@ec2-13-222-56-46.compute-1.amazonaws.com << EOF
            # Kill existing Java process
            pkill -f "java -jar" || true
            
            # Wait for process to terminate
            sleep 2
            
            # Get the latest JAR file
            JAR_FILE=\$(ls ~/rabitqproducer/app/rabitqproducer-*.jar | sort -V | tail -1)
            
            # Start the application with environment variables
            nohup java -jar "\$JAR_FILE" \
              --spring.application.name=rabitqproducer \
              --spring.rabbitmq.host=13.222.56.46 \
              --spring.rabbitmq.port=5672 \
              --spring.rabbitmq.username=${{ secrets.RABBITMQ_USERNAME }} \
              --spring.rabbitmq.password=${{ secrets.RABBITMQ_PASSWORD }} \
              --spring.rabbitmq.virtual-host=${{ secrets.RABBITMQ_VHOST }} \
              > ~/rabitqproducer/app/app.log 2>&1 &
            
            sleep 3
            echo "Application started. Checking status..."
            
            # Check if process is running
            if pgrep -f "java -jar"; then
              echo "✓ Application is running"
            else
              echo "✗ Application failed to start"
              exit 1
            fi
          EOF
      
      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/id_ed25519 ubuntu@ec2-13-222-56-46.compute-1.amazonaws.com \
            "curl -s http://localhost:8080/swagger-ui.html | head -20 || echo 'Health check pending...'"
      
      - name: Deployment summary
        run: echo "✓ Deployment complete to ec2-13-222-56-46.compute-1.amazonaws.com"

