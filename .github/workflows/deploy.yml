name: Build Docker Image and Deploy to EC2

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: milind75/rabitqproducer
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "014848113228"
  ECR_REPOSITORY: orderservice/rabitqproducer


jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Run tests
        run: ./gradlew test

  build-and-push:
    name: Build and Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::014848113228:role/GitHubActionsDeployRole
          aws-region: us-east-1

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin \
              ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

      - name: Build, tag, and push image
        id: build-image
        run: |
          IMAGE_URI="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" 
          docker build -t "$IMAGE_URI" .
          docker tag "$IMAGE_URI" "${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest"
          docker push "$IMAGE_URI"
          docker push "${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest"          
          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"  

  deploy:
    name: Deploy Image to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/milkeyED.pem
          chmod 600 ~/.ssh/milkeyED.pem
          ssh-keyscan -H ${{ vars.EC2_HOST }}.compute-1.amazonaws.com >> ~/.ssh/known_hosts

      - name: Deploy container on EC2
        run: |
          ssh -i ~/.ssh/milkeyED.pem ubuntu@${{ vars.EC2_HOST }}.compute-1.amazonaws.com << EOF
            set -e

            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin \
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
            docker pull "${{ needs.build-and-push.outputs.image }}"

            docker rm -f rabitqproducer || true

            docker run -d \
              --name rabitqproducer \
              --restart unless-stopped \
              -p 8080:8080 \
              -e RABBITMQ_USERNAME="${{ vars.RABBITMQ_USERNAME }}" \
              -e RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}" \
              -e RABBITMQ_VHOST="${{ vars.RABBITMQ_VHOST }}" \
              "${{ needs.build-and-push.outputs.image }}"
          EOF

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/milkeyED.pem ubuntu@${{ vars.EC2_HOST }}.compute-1.amazonaws.com \
            "docker ps --filter 'name=rabitqproducer'; curl -s http://localhost:8080/swagger-ui.html | head -20"

