name: Build Docker Image and Deploy to EC2

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  IMAGE_NAME: milind75/rabitqproducer

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Run tests
        run: ./gradlew test

  build-and-push:
    name: Build and Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_LOGIN_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build, tag, and push image
        id: build-image
        run: |
          IMAGE_URI="${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE_URI" .
          docker tag "$IMAGE_URI" "${{ env.IMAGE_NAME }}:latest"
          docker push "$IMAGE_URI"
          docker push "${{ env.IMAGE_NAME }}:latest"
          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy Image to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/milkeyED.pem
          chmod 600 ~/.ssh/milkeyED.pem
          ssh-keyscan -H ${{ vars.EC2_HOST }}.compute-1.amazonaws.com >> ~/.ssh/known_hosts

      - name: Deploy container on EC2
        run: |
          ssh -i ~/.ssh/milkeyED.pem ubuntu@${{ vars.EC2_HOST }}.compute-1.amazonaws.com << EOF
            set -e

            docker login -u "${{ vars.DOCKERHUB_LOGIN_USERNAME }}" --password-stdin <<< "${{ secrets.DOCKERHUB_TOKEN }}"
            docker pull "${{ needs.build-and-push.outputs.image }}"

            docker rm -f rabitqproducer || true

            docker run -d \
              --name rabitqproducer \
              --restart unless-stopped \
              -p 8080:8080 \
              -e RABBITMQ_USERNAME="${{ vars.RABBITMQ_USERNAME }}" \
              -e RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}" \
              -e RABBITMQ_VHOST="${{ vars.RABBITMQ_VHOST }}" \
              "${{ needs.build-and-push.outputs.image }}"
          EOF

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/milkeyED.pem ubuntu@${{ vars.EC2_HOST }}.compute-1.amazonaws.com \
            "docker ps --filter 'name=rabitqproducer'; curl -s http://localhost:8080/swagger-ui.html | head -20"

